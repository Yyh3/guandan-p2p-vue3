version: 1
plan:
  name: 'v3.8 网络层 P0 修复 — 联机死锁 + sendTo 过滤 + scanLanRooms 诚实化'
  max_concurrency: 1
  max_consecutive_failures: 2
  max_cycles: 4
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: pm-spec
    title: '写 v3.8 网络层 P0 修复 spec(3 个 bug 的修复方案 + 验收标准)'
    prompt: |
      你是 PM。**只写 spec,不写代码**。当前 dev server 在 http://localhost:8848/ 跑着,3 个 bug 已通过 Playwright 4-tab 实测确认。

      ## 任务
      读以下 2 个文件,基于「已经确认的 bug + 修复方向」写一份紧凑 spec,让 coder 看完能直接动手,verifier 看完能直接验收。

      必读:
      - /Users/yangyuanhao/Downloads/guandan-p2p-vue3/src/common/network.js (148 行,被改模块)
      - /Users/yangyuanhao/Downloads/guandan-p2p-vue3/src/views/room/RoomView.vue (net 调用方)
      - /Users/yangyuanhao/Downloads/guandan-p2p-vue3/docs/NETWORK.md (架构 + v1.0 现状)

      ## 已确认的 3 个 P0 bug(都来自 owner 审计)

      1. **死锁 (P0 致命)**:`joinRoom` 啥也不发,等 host 的 SYNC;`startAsHost` 啥也不广播,等 joiner 的 JOIN。两者互相等,死锁。
         - **修复方向**:joiner 在 channel 创建后**立即**发 `JOIN` 消息,host 收到后回 SYNC。
         - 注意:joiner 的 selfSeat 此时还是 -1,要确保自己发的 JOIN 不会被自己 onmessage 的 `from === selfSeat` 过滤掉(检查:0 === -1 false,会通过,所以是 OK 的)。

      2. **sendTo 不过滤 to (P0 高)**:`sendTo(seat, msg)` 加了 `to: seat`,但 host 端 onmessage 不看 `msg.to`,会误处理不是给自己的消息。
         - **修复方向**:在 host 的 `onmessage` 顶部加 `if (msg.to != null && msg.to !== selfSeat) return`。
         - joiner 的 onmessage 也加同样过滤(对称)。

      3. **scanLanRooms 伪造数据 (P0 中)**:始终返回 `[{ ip: '127.0.0.1', name: '本机(广播通道)' }]`,误导用户以为有真 LAN 扫描。
         - **修复方向**:改成返回 `[]` + 文档诚实标注「浏览器版不支持 LAN 扫描」。

      ## Spec 输出

      写到 `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/.harness/specs/v3.8-network-p0.md`,包含:

      1. **目标**:3 个 P0 bug 一次性修完,跑通 4-tab 联机
      2. **改动文件清单**:
         - `src/common/network.js` (主改)
         - `src/common/network.test.js` (新增,Node 原生 assert 风格,跟项目约定)
      3. **每个 bug 的具体改法**:给修复前/后代码 diff 示意(不是真改,只是说明意图)
      4. **测试要求**:
         - 单元测试覆盖 3 个 bug 的修复路径(用 EventEmitter 模拟 BroadcastChannel,跨 module 实例用 dynamic import 加 query string 破缓存,或者用 worker_threads)
         - 必跑的 4-tab 手动验证步骤 + 用 Playwright MCP 自动化
      5. **验收标准**:
         - `npm test` 0 失败
         - `npm run build` 0 错
         - Playwright 2-tab 流程:host + 1 joiner 能看到对方 + 能 NICK_UPDATE 广播 + 能正确 sendTo
         - joiner 不会再 seat=-1 卡死
      6. **不要做的事**:别动 engine/ai/game 业务逻辑、别引入网络依赖、别动网络层以外的文件
      7. **风险点**:提一下 BroadcastChannel 在某些浏览器(老 Safari)的兼容性,以及 dev mode 下 HMR 可能影响 BroadcastChannel 监听

      输出完成后,简报(3 句话以内)给到 owner。
    assigned_to: users-yangyuanhao-downloads-guandan-p2p-vue3--pm
    verified_by: verifier
    verify_prompt: |
      验证 spec 的完整性和可执行性:

      1. 读 spec `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/.harness/specs/v3.8-network-p0.md`
      2. 验证项:
         - 3 个 bug 都有具体修复方向(不是只列问题)
         - 改动文件清单完整(不能漏 `network.test.js`)
         - 测试要求有可执行的步骤(不是「写个测试」这种空话)
         - 验收标准有 PASS/FAIL 边界
         - 风险点提到了
      3. 输出报告,**末尾必须有一行 `VERDICT: PASS` 或 `VERDICT: FAIL`**,否则 engine 视为 inconclusive
    max_retries: 1

  - id: coder-p0
    title: '实施 v3.8 网络层 P0 3 修复 + 单元测试'
    prompt: |
      你是 coder。**先读 spec,再动手**。

      ## 必读
      - Spec: `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/.harness/specs/v3.8-network-p0.md`
      - 被改模块: `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/src/common/network.js`
      - 项目测试规范: `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/docs/TESTING.md`
      - 项目代码风格: `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/docs/STYLE.md`

      ## 任务
      按 spec 实施 3 个修复 + 写单元测试。

      ## 关键约束
      - **死锁修复**:joiner 在 channel 创建后**立即**发 `JOIN`,host 收到后回 SYNC。要验证 joiner 自己发的 JOIN 不会被自己 onmessage 的过滤吞掉。
      - **sendTo 过滤**:host + joiner 的 onmessage 顶部都加 `if (msg.to != null && msg.to !== selfSeat) return`。
      - **scanLanRooms**:返回 `[]`,并在 JSDoc 注释里说明浏览器版不支持 LAN 扫描。
      - **单元测试**:`src/common/network.test.js` 用 EventEmitter 模拟 BroadcastChannel(参考已经存在的 `src/common/network.test.js` 文件,如果它有了;否则用 Node 原生 `events`)。覆盖:
        1. host 收到 JOIN 后回 SYNC(SYNC 包含完整 peers 列表)
        2. joiner 主动发 JOIN 后能收到 SYNC + 完成座位分配
        3. sendTo 的消息不会被非目标 onmessage 触发
        4. scanLanRooms 返回 `[]`
      - **多 module 实例测试**:用 `await import('./network.js?t=' + Date.now())` 破缓存,模拟 2 个独立 tab。或者用 `worker_threads`。
      - **遵循项目约定**:ESM、`eq` + `assert` helper、每块 `=== N. 块名 ===`、末尾 `========== 测试结果: X 通过 / Y 失败 ==========`、`fail > 0` 时 `process.exit(1)`。
      - **跑 `npm test`**:必须 0 失败(包括现有的 279 用例不能回归)
      - **跑 `npm run build`**:必须 0 错

      ## 4-tab Playwright 自动化验证(spec 要求)

      dev server 在 http://localhost:8848/ 跑着。用 Playwright MCP 工具:
      1. `browser_tabs action:new` 开 2 个 tab
      2. Tab 0: `browser_navigate http://localhost:8848/` + `browser_evaluate` 调 `await import('/src/common/network.js')` + `setRoomId('TEST01')` + `startAsHost({...})`,缓存到 `window.__net1`
      3. `browser_tabs action:select index:1` 切到 Tab 1
      4. Tab 1:同样 navigate + `await import('/src/common/network.js')` + `joinRoom('TEST01', {...})` + 缓存
      5. `browser_evaluate` 等 500ms 后查 `getSelfSeat()` 应该是 1
      6. 切回 Tab 0 查 `peers.size` 应该是 2
      7. 截图存到 `/Users/yangyuanhao/.mavis/plans/<plan_id>/outputs/coder-p0/screenshots/`
      8. 至少 2 张截图:host 看到 joiner、joiner 看到 host

      ## 交付物

      写到 `/Users/yangyuanhao/.mavis/plans/<plan_id>/outputs/coder-p0/deliverable.md`,包含:
      - 改动文件清单
      - `npm test` 输出最后 5 行
      - `npm run build` 输出最后 5 行
      - 4-tab Playwright 验证结果(每步的 PASS/FAIL)
      - 截图路径
      - 已知未做的(留给 v3.8 后面的 round)
    assigned_to: coder
    depends_on: [pm-spec]
    verified_by: verifier
    verify_prompt: |
      **独立验证 3 个修复 + 单元测试 + 4-tab 联机**。不只看 producer 的报告。

      1. 读 `deliverable.md`(`/Users/yangyuanhao/.mavis/plans/<plan_id>/outputs/coder-p0/deliverable.md`)
      2. **独立跑测试**:
         - `cd /Users/yangyuanhao/Downloads/guandan-p2p-vue3 && npm test 2>&1 | tail -10` — 0 失败?
         - `npm run build 2>&1 | tail -5` — 0 错?
      3. **读 network.js 改动**:确认 3 个 bug 的修复都到位:
         - 死锁:joinRoom 里有 `sendMessage({ type: 'JOIN', ... })` 或类似
         - sendTo 过滤:host + joiner 的 onmessage 顶部有 `msg.to` 检查
         - scanLanRooms 返回 `[]`
      4. **跑 4-tab 联机自测**(自己跑,不只信 producer):
         - Playwright MCP 开 2 tab
         - Tab 0: `startAsHost({ nickname: 'A', avatar: 'A' })`,缓存到 `window.__net1`
         - Tab 1: `joinRoom('TEST01', { nickname: 'B', avatar: 'B' })`,缓存到 `window.__net2`
         - 等 500ms,查 `__net2.getSelfSeat()` === 1?
         - 切回 Tab 0 查 `__net1.getPeers().size` === 2?
         - Tab 1 broadcast NICK_UPDATE,Tab 0 收到?
         - Tab 0 sendTo(1, {type: 'PRIVATE'}),Tab 0 自己 onmessage 不会触发 'PRIVATE' 事件?
      5. **截图**:至少 2 张 Playwright 截图证明 4-tab 联通。

      报告必须以 `VERDICT: PASS` 或 `VERDICT: FAIL` 结尾(否则 engine 视为 inconclusive 会反复 abort)。
    max_retries: 2
