tasks:
  - id: pm-spec-r2
    title: '写 v3.8 网络层 P1 健壮性 spec(UUID 去重 / 心跳 / 并发撞座)'
    prompt: |
      你是 PM。**只写 spec,不写代码**。3 个 P1 bug 来源是 owner 上一轮审计(见 `/Users/yangyuanhao/.mavis/plans/plan_24ae0adc/outputs/pm-spec/deliverable.md` 里 PM 找到的 4 个硬依赖,以及 owner 审计报告里 P1 部分)。

      ## 必读
      - `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/src/common/network.js`(P0 修完的当前状态)
      - `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/.harness/specs/v3.8-network-p0.md`(P0 spec,看上一轮怎么写的)
      - `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/docs/NETWORK.md`(架构 + v1.0 现状)
      - 上一轮 deliverable:`/Users/yangyuanhao/.mavis/plans/plan_24ae0adc/outputs/coder-p0/deliverable.md`

      ## 3 个 P1 bug(来自 owner 审计)

      1. **UUID 去重(高)**:joiner 标签刷新/重连会重复占座。老 joiner A 在 seat 1,重连后新 joiner 拿到 seat 2(host 不知道是同一个人)。一个人占 2 个座位,挤掉真玩家。
         - **修复方向**:
           - joiner 在 joinRoom 时生成 UUID(可用 `crypto.randomUUID()` 或简单 `Math.random().toString(36)`),把 UUID 塞进 self info。
           - host 收到 JOIN 时,扫整个 peers map,看 `peer.uuid === newUuid`,找到就**复用旧 seat**(更新 nickname/avatar)而不是新分配。
           - host 把 UUID 写入 peers map 的 entry 里,SYNC 也带 UUID 字段。
           - joiner 自己端 peers map 也存 UUID(用于自己识别自己)。

      2. **心跳 + 断线检测(高)**:玩家关标签,host 的 `peers` map 永远不清,房间变「假满」,新玩家进不来。
         - **修复方向**:
           - 加 `HEARTBEAT` 消息类型,每 3s 一次。
           - joiner 端启动 setInterval 发 `HEARTBEAT { ts: Date.now() }`。
           - host 端维护 `lastHeartbeat: Map<seat, ts>`,每收到 HEARTBEAT 更新。
           - host 端启动 setInterval,每 5s 扫一遍 peers,如果 `now - lastHeartbeat[seat] > 10000` (10s 没收到),**释放 seat**:`peers.delete(seat)` + `emit('peer:leave', { seat })`。
           - joiner 端 close / onUnmounted 也要清 interval。

      3. **并发 joiner 撞座(中)**:2 个 joiner 同时加载,可能都被分到 seat 1(因为 host 不立刻知道,先到先得但两个 SYNC 都来自分别 host 同一时刻)。修完 Bug #1 后 UUID 机制部分缓解(每个 joiner 有自己的 UUID),但仍可能撞。
         - **修复方向**:
           - host 收到 JOIN 后,**立刻**广播一个新 SYNC 给该 joiner(已有),不立刻广播给其他人。
           - 第二个 joiner 来了,host 用第一个空位分配,广播 SYNC 给第二个。
           - joiner 收到 SYNC 后检查自己的 seat 是否被 SYNC 更新前的事件标记为「已占」,若被占就再次请求 SYNC(host 重发)。
           - **简化方案**(推荐):host 分配 seat 后,把「peers 更新」通过 SYNC 广播给**所有 joiner**,joiners 端处理 SYNC 时如果自己的 seat 已经在新 peers 里被别人占了,自动让出 + 重新请求 SYNC。
           - **更简单的方案**:joiner 收到 SYNC 时校验「我被分配的 seat 是不是我之前要求的」,不一致就忽略 SYNC,300ms 后重发 JOIN 让 host 重新分配。

      ## Spec 输出

      写到 `/Users/yangyuanhao/Downloads/guandan-p2p-vue3/.harness/specs/v3.8-network-p1.md`,包含:

      1. **目标**:3 个 P1 健壮性 bug 一次性修完
      2. **改动文件清单**(估):
         - `src/common/network.js`(主改,UUID 字段 + 心跳 setInterval + 并发处理)
         - `src/common/network.test.js`(加 30+ 用例)
         - 可能:`src/views/room/RoomView.vue`(把心跳/UUID 暴露给 UI,可选)
      3. **每个 bug 的具体改法**:修复前/后代码 diff 示意(包含新增字段、新增定时器、新增事件)
      4. **测试要求**:
         - **单实例单元测试**:UUID 去重 / 心跳超时释放 seat / 并发 joiner 撞座(用 mock EventEmitter 模拟时序)
         - **时序相关测试**:`setTimeout` / `setInterval` 必须用 fake timers(推荐 `node:test` 内置或简单 mock)。否则实际跑要 10s+ 等心跳超时,跑不完。
      5. **验收标准**:
         - `npm test` 0 失败(317 + 30+ ≈ 350)
         - `npm run build` 0 错
         - **不要求 4-tab Playwright**(同 P0 上轮教训,verifier 跑)
         - joiner 重连后,host `peers.size` 不增长(UUID 去重验证)
         - 1 joiner 标签关掉,host 10s 内 `peers.size` 自动减 1
         - 2 joiner 并发 join,最终 `peers.size` 正确(无撞座)
      6. **不要做的事**:
         - 别动 v3.8 P0 修复过的逻辑(自洽性保护:别破坏 joiner 主动发 JOIN 流程)
         - 别动 engine/ai/game
         - 别引入第三方库(心跳用原生 setInterval / setTimeout 即可)
         - 别动 v2.0 真机联机(那是 v2.0 plan 的事)
      7. **风险点**:
         - heartbeat setInterval 没清掉会内存泄漏(close / onUnmounted 必须清)
         - UUID 持久化(刷新后 UUID 变,被识别为新玩家,老座位不会释放) —— **简单方案:UUID 走 sessionStorage 而非 localStorage**,刷新 tab 仍能复用 UUID;完全退出浏览器后才视为新玩家。
         - 时序测试必须用 fake timer

      输出完成后,3 句话简报给到 owner。
    assigned_to: users-yangyuanhao-downloads-guandan-p2p-vue3--pm
