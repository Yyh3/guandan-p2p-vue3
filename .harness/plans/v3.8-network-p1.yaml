      ## 任务范围(明确砍掉了上次超时的部分)

      ### 必做(代码 + 单测)
      按 spec 实施 3 个修复:
      1. **UUID 去重** — `joinRoom` 生成 UUID 存进 self info,host 收到 JOIN 时先按 UUID 查重
      2. **心跳 + 断线检测** — joiner 每 3s 发 HEARTBEAT,host 10s 没收到就释放 seat + emit peer:leave
      3. **并发 joiner 撞座** — joiner 收到 SYNC 时校验 seat,被占就重新请求

