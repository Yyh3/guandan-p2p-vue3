      - **新增事件**:`peer:leave { seat }`(host 端 emit)

      ## 时序测试关键(否则跑不完)
      心跳测试需要「等 10s 才超时」—— **必须用 fake timer**:
      ```js
      // 简单方案:用 setTimeout 包装 + 手动驱动
      let _now = Date.now()
      const _setTimeout = setTimeout
      globalThis.setTimeout = (fn, ms) => _setTimeout(fn, 0)  // 立即执行
      globalThis.setInterval = (fn, ms) => ({ clear: () => {} })  // 不真跑
      ```
      或者用更干净的 mock 框架(比如用 `node:test` + `mock.timers.enable()`),但项目没用 node:test,沿用原生 assert。
      **务必**别真等 10s。

      ## 时间控制
