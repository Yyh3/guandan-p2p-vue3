      - **v3.8 P0 修复必须保留**:joiner 主动发 JOIN / sendTo to 过滤 / scanLanRooms = []
      - **RoomView.vue L177-184 setRoomId 顺序必须保留**
      - **网络层外部 API 稳定**:`startAsHost / joinRoom / broadcast / sendTo / on / off` 签名不变(UUID 自动塞 self info,不要求外部传)
